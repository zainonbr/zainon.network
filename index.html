            const isTablet = (screenWidth >= 768 && screenWidth <= 1024) ||

            let viewportContent = "width=device-width, initial-scale=1.0";
           
            if (isTablet) {

    <script>
        (function() {
            'use strict';
           
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            const isTablet = (window.innerWidth >= 768 && window.innerWidth <= 1024) ||
                            (window.innerHeight >= 768 && window.innerHeight <= 1024);
           
            function adjustScale() {
                const width = window.innerWidth;
                const height = window.innerHeight;
                const root = document.documentElement;
               
                if (width <= 360) root.style.fontSize = '11px';
                else if (width <= 480) root.style.fontSize = '12px';
                else if (width <= 768) root.style.fontSize = '13px';
                else if (width <= 992) root.style.fontSize = '14px';
                else if (width <= 1200) root.style.fontSize = '15px';
                else root.style.fontSize = '16px';
               
                if (isTablet) root.style.fontSize = '15px';
               
                if (height < 600 && width > height) root.style.fontSize = '12px';
            }
           
            (function securityMeasures() {
                document.addEventListener('contextmenu', (e) => { e.preventDefault(); return false; });
                document.addEventListener('keydown', (e) => {
                    if (e.ctrlKey && (e.key === 'u' || e.key === 'U' || e.key === 's' || e.key === 'S' ||
                                      e.key === 'i' || e.key === 'I' || e.key === 'c' || e.key === 'C' ||
                                      e.key === 'v' || e.key === 'V')) {
                        e.preventDefault();
                        return false;
                    }
                    if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                        e.preventDefault();
                        return false;
                    }
                });
               
                document.querySelector('.background-image')?.addEventListener('dragstart', (e) => {
                    e.preventDefault();
                });
            })();
           
            let audioContext = null;
           
            function initAudio() {
                if (audioContext) return;
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    if (isIOS && audioContext.state === 'suspended') {
                        audioContext.resume();
                    }
                } catch (e) {
                    console.log('Áudio não suportado');
                }
            }
           
            function playSound(freq = 600, type = 'sine') {
                if (!audioContext || audioContext.state === 'closed') return;
                if (audioContext.state === 'suspended') {
                    audioContext.resume().then(() => createSound(freq, type)).catch(() => {});
                } else {
                    createSound(freq, type);
                }
            }
           
            function createSound(freq, type) {
                try {
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    oscillator.type = type;
                    oscillator.frequency.value = freq;
                    gainNode.gain.value = 0.02;
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    oscillator.start();
                    const now = audioContext.currentTime;
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                    oscillator.stop(now + 0.05);
                } catch (e) {}
            }
           
            function initLinkInteractions() {
                const links = document.querySelectorAll('.terminal-link');
                links.forEach(link => {
                    link.addEventListener('touchstart', (e) => {
                        initAudio();
                        playSound(600, 'triangle');
                        link.classList.add('touch-active');
                        setTimeout(() => link.classList.remove('touch-active'), 200);
                    }, { passive: true });
                   
                    link.addEventListener('mousedown', (e) => {
                        initAudio();
                        playSound(600, 'triangle');
                        link.classList.add('touch-active');
                        setTimeout(() => link.classList.remove('touch-active'), 200);
                    });
                   
                    link.addEventListener('click', (e) => {
                        playSound(900, 'square');
                        link.style.transform = 'scale(0.98)';
                        setTimeout(() => link.style.transform = '', 100);
                    });
                   
                    ['touchend', 'touchcancel', 'mouseup', 'mouseleave'].forEach(ev => {
                        link.addEventListener(ev, () => link.classList.remove('touch-active'));
                    });
                });
            }
           
            let resizeTimeout;
            function handleResize() {
                if (resizeTimeout) clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    adjustScale();
                    const bgImage = document.querySelector('.background-image');
                    if (bgImage) {
                        bgImage.style.transform = 'translate(-50%, -50%) scale(1)';
                        setTimeout(() => {
                            bgImage.style.transform = 'translate(-50%, -50%) scale(1.01)';
                            setTimeout(() => bgImage.style.transform = 'translate(-50%, -50%) scale(1)', 50);
                        }, 50);
                    }
                }, 100);
            }
           
            function init() {
                adjustScale();
                initLinkInteractions();
                window.addEventListener('resize', handleResize, { passive: true });
                window.addEventListener('orientationchange', handleResize, { passive: true });
                console.log('ZNN System - Watch Dogs Edition');
            }
           
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <!-- VIEWPORT CORRETO - ÚNICO E SIMPLES -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
   
    <title>Social Networks // Zainon</title>
   
    <meta name="theme-color" content="#0a1a2a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
   
    <!-- Preconnect para fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Chakra+Petch:wght@400;600;700&family=Share+Tech+Mono&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
   
    <style>
        /* ---------- RESET E VARIÁVEIS ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #00ffff;
            --secondary: #ffaa00;
            --tertiary: #0066ff;
            --bg-deep: #0a1a2a;
            --bg-card: rgba(0, 5, 15, 0.85);
            --neon-cyan: #00ffff;
            --neon-orange: #ffaa00;
            --neon-blue: #0066ff;
            
            /* Espaçamentos fluidos */
            --space-xs: clamp(4px, 1vw, 8px);
            --space-sm: clamp(8px, 2vw, 12px);
            --space-md: clamp(12px, 3vw, 20px);
            --space-lg: clamp(16px, 4vw, 30px);
            --space-xl: clamp(20px, 5vw, 40px);
            
            /* Fontes fluidas */
            --text-xs: clamp(10px, 2.5vw, 12px);
            --text-sm: clamp(12px, 3vw, 14px);
            --text-md: clamp(14px, 3.5vw, 16px);
            --text-lg: clamp(16px, 4vw, 18px);
            --text-xl: clamp(18px, 5vw, 22px);
            --text-2xl: clamp(20px, 6vw, 28px);
            --text-3xl: clamp(24px, 7vw, 36px);
            --text-4xl: clamp(28px, 8vw, 48px);
        }

        /* Prevenção de zoom em iOS */
        html {
            -webkit-text-size-adjust: 100%;
            -moz-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        /* ---------- ANIMAÇÕES ---------- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 5px currentColor, 0 0 10px currentColor; }
            50% { text-shadow: 0 0 15px currentColor, 0 0 25px currentColor; }
        }

        @keyframes scanMove {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(300%); }
        }

        /* ---------- BACKGROUND ---------- */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -5;
            overflow: hidden;
        }

        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://preview.redd.it/watch-dogs-2-san-francisco-from-marin-v0-ddxiq1ol8uwa1.png?width=1080&crop=smart&auto=webp&s=c49202a3d18993cf7787c0a6085ce15c22c6b816') no-repeat center center;
            background-size: cover;
            pointer-events: none;
        }

        .background-protection {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -4;
            pointer-events: none;
            backdrop-filter: blur(1px);
        }

        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg,
                rgba(0, 20, 40, 0.8) 0%,
                rgba(0, 40, 60, 0.6) 50%,
                rgba(10, 20, 30, 0.9) 100%);
            z-index: -3;
            pointer-events: none;
        }

        .wd-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -2;
            pointer-events: none;
            opacity: 0.2;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 255, 0.03) 2px,
                rgba(255, 170, 0, 0.03) 4px
            );
            pointer-events: none;
            z-index: 1;
            opacity: 0.25;
            mix-blend-mode: overlay;
            animation: scanMove 15s infinite linear;
        }

        /* ---------- BODY MOBILE-FIRST ---------- */
        body {
            font-family: 'Chakra Petch', 'Share Tech Mono', monospace;
            background: transparent;
            color: var(--primary);
            min-height: 100vh; /* fallback */
            min-height: 100dvh; /* moderno */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            -webkit-font-smoothing: antialiased;
        }

        /* ---------- CONTAINER PRINCIPAL ---------- */
        .main-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--space-md);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ---------- CARD RESPONSIVO ---------- */
        .card {
            position: relative;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: var(--space-lg);
            border: 2px solid var(--neon-cyan);
            border-radius: 12px;
            box-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-blue), inset 0 0 20px rgba(0, 255, 255, 0.2);
            width: 100%;
            max-width: 650px;
            animation: fadeIn 0.8s ease-out;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-orange), transparent);
            animation: scanMove 6s infinite;
            opacity: 0.8;
        }

        /* ---------- TÍTULO ---------- */
        .glitch-name {
            font-family: 'Press Start 2P', cursive;
            font-size: var(--text-3xl);
            margin-bottom: var(--space-md);
            text-align: center;
            color: white;
            text-shadow: 
                2px 2px 0 var(--neon-cyan),
                4px 4px 0 var(--neon-blue),
                6px 6px 0 var(--neon-orange);
            line-height: 1.3;
            word-break: break-word;
            width: 100%;
        }

        /* ---------- BIO ---------- */
        .bio {
            color: var(--neon-cyan);
            font-size: var(--text-md);
            margin-bottom: var(--space-lg);
            text-align: center;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 1px;
            text-shadow: 0 0 8px currentColor;
            border-bottom: 1px solid var(--neon-cyan);
            padding-bottom: var(--space-md);
            position: relative;
            text-transform: uppercase;
            max-width: 100%;
        }

        .bio::before {
            content: '『';
            position: absolute;
            left: -15px;
            color: var(--neon-orange);
            animation: glowPulse 1.5s infinite;
            font-size: var(--text-lg);
        }

        .bio::after {
            content: '』';
            position: absolute;
            right: -15px;
            color: var(--neon-orange);
            animation: glowPulse 1.5s infinite;
            font-size: var(--text-lg);
        }

        /* ---------- LINKS TERMINAL ---------- */
        .terminal-links {
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
            margin: var(--space-lg) 0;
            width: 100%;
        }

        .terminal-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-sm) var(--space-md);
            background: rgba(0, 10, 20, 0.7);
            border: 1px solid var(--neon-cyan);
            border-radius: 6px;
            color: white;
            text-decoration: none;
            font-family: 'Share Tech Mono', monospace;
            font-size: var(--text-sm);
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease;
            min-height: 48px;
            width: 100%;
            animation: fadeIn 0.8s ease-out;
            animation-fill-mode: both;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
        }

        .terminal-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.15), transparent);
            transition: left 0.4s;
            pointer-events: none;
        }

        .terminal-link span:nth-child(2) {
            flex: 1;
            text-align: center;
            margin: 0 var(--space-xs);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 4px;
        }

        .link-icon {
            color: var(--neon-cyan);
            font-size: var(--text-lg);
            text-shadow: 0 0 8px currentColor;
            min-width: 36px;
            text-align: center;
        }

        .link-stats {
            font-size: var(--text-xs);
            color: var(--neon-blue);
            opacity: 0.9;
            padding: 4px 6px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 4px;
            border-left: 2px solid var(--neon-orange);
            white-space: nowrap;
            min-width: 70px;
            text-align: center;
        }

        /* Hover apenas para desktop */
        @media (hover: hover) {
            .terminal-link:hover {
                transform: translateX(5px);
                border-color: var(--neon-orange);
                background: rgba(255, 170, 0, 0.15);
                box-shadow: 0 0 15px var(--neon-orange), 0 0 25px var(--neon-cyan);
            }
            .terminal-link:hover::before {
                left: 100%;
            }
            .terminal-link:hover .link-icon {
                color: var(--neon-orange);
                transform: scale(1.1);
            }
        }

        /* Estado ativo para touch */
        .terminal-link:active {
            transform: scale(0.98);
            background: rgba(0, 255, 255, 0.2);
            border-color: var(--neon-orange);
            box-shadow: 0 0 20px var(--neon-orange);
        }

        /* Delays de animação */
        .terminal-link:nth-child(1) { animation-delay: 0.1s; }
        .terminal-link:nth-child(2) { animation-delay: 0.15s; }
        .terminal-link:nth-child(3) { animation-delay: 0.2s; }
        .terminal-link:nth-child(4) { animation-delay: 0.25s; }
        .terminal-link:nth-child(5) { animation-delay: 0.3s; }
        .terminal-link:nth-child(6) { animation-delay: 0.35s; }

        /* ---------- COPYRIGHT ---------- */
        .copyright {
            margin-top: var(--space-lg);
            text-align: center;
            font-size: var(--text-xs);
            color: rgba(0, 255, 255, 0.5);
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 1px;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
            padding-top: var(--space-sm);
        }

        .copyright .znn {
            color: var(--neon-orange);
            font-weight: bold;
            text-shadow: 0 0 8px currentColor;
        }

        /* ---------- WATERMARK ---------- */
        .security-watermark {
            position: fixed;
            bottom: max(5px, env(safe-area-inset-bottom));
            right: max(5px, env(safe-area-inset-right));
            z-index: 9999;
            font-family: 'Share Tech Mono', monospace;
            font-size: 8px;
            color: rgba(0, 255, 255, 0.15);
            writing-mode: vertical-rl;
            text-orientation: mixed;
            pointer-events: none;
            transform: rotate(180deg);
            letter-spacing: 2px;
        }

        /* ========== MEDIA QUERIES ========== */
        /* Mobile pequeno (até 360px) */
        @media (max-width: 360px) {
            .glitch-name {
                font-size: var(--text-2xl);
                text-shadow: 1px 1px 0 var(--neon-cyan), 2px 2px 0 var(--neon-blue), 3px 3px 0 var(--neon-orange);
            }
            
            .bio::before, .bio::after {
                display: none;
            }
            
            .terminal-link span:nth-child(2) {
                font-size: 11px;
            }
            
            .link-stats {
                min-width: 60px;
                font-size: 9px;
                padding: 2px 4px;
            }
            
            .link-icon {
                min-width: 30px;
                font-size: var(--text-md);
            }
        }

        /* Mobile médio (361px - 480px) */
        @media (min-width: 361px) and (max-width: 480px) {
            .glitch-name {
                font-size: var(--text-3xl);
            }
            
            .bio::before, .bio::after {
                display: none;
            }
            
            .terminal-link span:nth-child(2) {
                font-size: 12px;
            }
            
            .link-stats {
                min-width: 65px;
            }
        }

        /* Mobile grande / Tablets pequenos (481px - 768px) */
        @media (min-width: 481px) and (max-width: 768px) {
            .glitch-name {
                font-size: 32px;
            }
            
            .bio {
                font-size: 15px;
            }
            
            .terminal-link {
                font-size: 15px;
                min-height: 52px;
            }
            
            .bio::before, .bio::after {
                font-size: 18px;
            }
        }

        /* Tablets (769px - 1024px) */
        @media (min-width: 769px) and (max-width: 1024px) {
            .card {
                max-width: 600px;
            }
            
            .glitch-name {
                font-size: 40px;
            }
            
            .terminal-link {
                min-height: 56px;
                font-size: 16px;
            }
        }

        /* Desktop (acima de 1024px) */
        @media (min-width: 1025px) {
            .card {
                max-width: 650px;
            }
            
            .glitch-name {
                font-size: 48px;
            }
            
            .bio {
                font-size: 18px;
            }
            
            .terminal-link {
                min-height: 60px;
                font-size: 18px;
            }
            
            .link-stats {
                font-size: 12px;
            }
        }

        /* Telas muito grandes */
        @media (min-width: 1600px) {
            .card {
                max-width: 750px;
            }
            
            .glitch-name {
                font-size: 56px;
            }
            
            .bio {
                font-size: 20px;
            }
        }

        /* Orientação paisagem em dispositivos móveis */
        @media (orientation: landscape) and (max-height: 600px) {
            body {
                justify-content: flex-start;
                padding-top: var(--space-md);
            }
            
            .card {
                padding: var(--space-md);
            }
            
            .glitch-name {
                font-size: 22px;
                margin-bottom: var(--space-sm);
            }
            
            .bio {
                margin-bottom: var(--space-md);
                padding-bottom: var(--space-sm);
                font-size: 13px;
            }
            
            .terminal-links {
                gap: 6px;
                margin: var(--space-md) 0;
            }
            
            .terminal-link {
                min-height: 40px;
                padding: 6px 10px;
            }
            
            .copyright {
                margin-top: var(--space-md);
                padding-top: var(--space-xs);
            }
        }

        /* Ajustes para telas com notch */
        @supports (padding: max(0px)) {
            .main-container {
                padding-left: max(var(--space-md), env(safe-area-inset-left));
                padding-right: max(var(--space-md), env(safe-area-inset-right));
            }
        }
    </style>
</head>

    <!-- JavaScript apenas para interatividade (sem manipulação de layout) -->
    <script>
        (function() {
            'use strict';
           
            // Áudio para feedback (opcional)
            let audioContext = null;
           
            function initAudio() {
                if (audioContext) return;
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                } catch (e) {}
            }
           
            function playSound(freq = 600) {
                if (!audioContext || audioContext.state === 'closed') return;
                if (audioContext.state === 'suspended') {
                    audioContext.resume().then(() => createSound(freq)).catch(() => {});
                } else {
                    createSound(freq);
                }
            }
           
            function createSound(freq) {
                try {
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    oscillator.type = 'sine';
                    oscillator.frequency.value = freq;
                    gainNode.gain.value = 0.02;
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    oscillator.start();
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.05);
                    oscillator.stop(audioContext.currentTime + 0.05);
                } catch (e) {}
            }
           
            // Adicionar feedback sonoro aos links (opcional)
            const links = document.querySelectorAll('.terminal-link');
            links.forEach(link => {
                link.addEventListener('touchstart', (e) => {
                    initAudio();
                    playSound(600);
                }, { passive: true });
               
                link.addEventListener('mousedown', (e) => {
                    initAudio();
                    playSound(600);
                });
            });
           
            // Segurança básica
            document.addEventListener('contextmenu', (e) => e.preventDefault());
           
            console.log('ZAINON - Landing Page Responsiva');
        })();
    </script>
